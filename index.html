<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lostmon Canaã — Pokédex</title>
<style>
  :root {
    --bg: #1a1600;
    --card: #2a2200;
    --border: #4a3c00;
    --accent: #e8b800;
    --gold: #f0c040;
    --text: #e8f0f8;
    --muted: #8aabcc;
    --gs97r: #c8a000;
    --kep: #c0392b;
    --both: #9b7ec8;
    --beta: #d4a017;
    --canonical: #555f6e;
    --legendary: #c0392b;
    --spg: #2e8b57;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; }

  header {
    background: linear-gradient(135deg, #2a2200, #1a1600);
    padding: 32px 40px 24px;
    border-bottom: 2px solid var(--gold);
  }
  header h1 { font-size: 2.2rem; color: var(--gold); letter-spacing: 2px; }
  header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }
  .stats-bar {
    display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap;
  }
  .stat { background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; }
  .stat span { color: var(--gold); font-weight: bold; font-size: 1.1rem; }

  .controls {
    background: #211b00;
    padding: 16px 40px;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  input[type=text] {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 8px; font-size: 0.9rem; width: 220px;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 8px; font-size: 0.9rem; outline: none;
    cursor: pointer;
  }
  .view-toggle button {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  }
  .view-toggle button.active { background: var(--accent); color: #1a1600; border-color: var(--accent); }

  .legend {
    display: flex; gap: 12px; flex-wrap: wrap; padding: 12px 40px;
    background: #211b00; border-bottom: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* GRID VIEW */
  #grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 24px 40px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .card .num { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
  .card .sprite-wrap {
    width: 112px; height: 112px; margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  /* Pokéball-style ring: top half red, bottom half white, black divider */
  .card .sprite-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      #cc0000 0deg 180deg,
      #ffffff 180deg 360deg
    );
    z-index: 0;
  }
  /* Black center band */
  .card .sprite-wrap::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: calc(50% - 3px);
    height: 6px;
    background: #111;
    z-index: 1;
  }
  /* White inner circle (sprite background) */
  .card .sprite-inner {
    position: relative;
    z-index: 2;
    width: 74px; height: 74px; flex-shrink: 0;
    border-radius: 50%;
    background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px #111;
    overflow: hidden;
  }
  .card .sprite-inner img {
    width: 66px; height: 66px;
    image-rendering: pixelated;
  }
  .card .sprite-inner .no-sprite {
    font-size: 1.4rem; color: #999;
  }
  /* Table view sprite — simpler pokeball ring */
  td .sprite-wrap-table {
    display: inline-flex; align-items: center; justify-content: center;
    width: 60px; height: 60px; border-radius: 50%; position: relative;
    background: conic-gradient(#cc0000 0deg 180deg, #ffffff 180deg 360deg);
    box-shadow: 0 0 0 2px #111;
  }
  td .sprite-wrap-table::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: calc(50% - 2px);
    height: 4px;
    background: #111;
    z-index: 1;
  }
  td .sprite-wrap-table .sprite-inner-table {
    position: relative; z-index: 2;
    width: 46px; height: 46px; border-radius: 50%;
    background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px #111;
    overflow: hidden;
  }
  td .sprite-wrap-table .sprite-inner-table img {
    width: 40px; height: 40px; image-rendering: pixelated;
  }
  .card .name { font-size: 0.82rem; font-weight: bold; color: var(--text); word-break: break-word; }
  .card .evo-short { font-size: 0.7rem; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .source-badge {
    position: absolute; top: 8px; right: 8px;
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* TABLE VIEW */
  #table-view { padding: 24px 40px; display: none; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    background: #2a2200; color: var(--gold); font-weight: bold;
    padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--gold);
    position: sticky; top: 57px;
  }
  td { padding: 8px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(232,184,0,0.05); }
  td img { image-rendering: pixelated; width: 48px; height: 48px; }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.72rem; font-weight: bold; white-space: nowrap;
  }

  .hidden { display: none !important; }

  /* Source colors */
  .src-gs97r   { background: rgba(91,155,213,0.2); color: #7bbfff; }
  .src-kep     { background: rgba(106,177,135,0.2); color: #7dd4a0; }
  .src-both    { background: rgba(155,126,200,0.2); color: #c9a8ff; }
  .src-beta    { background: rgba(212,160,23,0.2); color: #f0c040; }
  .src-canon   { background: rgba(85,95,110,0.2); color: #aabbcc; }
  .src-legend  { background: rgba(192,57,43,0.2); color: #ff8070; }
  .src-spg     { background: rgba(46,139,87,0.2); color: #5dba82; }

  .dot-gs97r  { background: var(--gs97r); }
  .dot-kep    { background: var(--kep); }
  .dot-both   { background: var(--both); }
  .dot-beta   { background: var(--beta); }
  .dot-canon  { background: var(--canonical); }
  .dot-legend { background: var(--legendary); }
  .dot-spg    { background: var(--spg); }

  .research-flag { color: #ff6b6b; font-size: 0.75rem; }

  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); }
</style>
</head>

function toggleSpriteSide() {
  showBack = !showBack;
  document.getElementById('btn-sprite-side').textContent = showBack ? '🔄 Show Front' : '🔄 Show Back';
  buildGrid(currentData);
  buildTable(currentData);
}

function nameToKey(name) {
  return name.toLowerCase()
    .replace('farfetch_d', 'farfetchd')
    .replace('sirfetch_d', 'sirfetchd')
    .replace('porygon-z',  'porygon_z')
    .replace(/[^a-z0-9_]/g, '');
}

function spriteUrl(name, source) {
  const n = nameToKey(name);
  const side = showBack ? 'back' : 'front';
  return ['sprites/' + n + '/' + side + '.png', 'sprites/' + n + '.png'];
}

function getSourceClass(source) {
  if (source === 'both') return 'src-both';
  if (source === 'gs97r') return 'src-gs97r';
  if (source === 'kep') return 'src-kep';
  if (source === 'beta') return 'src-beta';
  if (source === 'legend') return 'src-legend';
  if (source === 'spg') return 'src-spg';
  return 'src-canon';
}
function getDotClass(source) { return 'dot-' + (source === 'spg' ? 'spg' : source); }

function getSourceLabel(source) {
  const map = { gs97r:'GS97R', kep:'KEP', both:'GS97R+KEP', beta:'Beta', canon:'Canonical', legend:'Legendary', spg:'SPG' };
  return map[source] || source;
}

// Smart image loader with fallback
function loadSprite(imgEl, urls, index = 0) {
  if (index >= urls.length) {
    // No sprite found — replace with question mark
    const wrap = imgEl.parentElement;
    wrap.innerHTML = '<div class="no-sprite">?</div>';
    return;
  }
  imgEl.src = urls[index];
  imgEl.onerror = () => loadSprite(imgEl, urls, index + 1);
}

function buildGrid(data) {
  currentData = data;
  const grid = document.getElementById('grid-view');
  grid.innerHTML = '';
  data.forEach(([num, name, evo, source, notes]) => {
    const urls = spriteUrl(name, source);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.source = source;
    card.dataset.name = name.toLowerCase();

    const hasResearch = notes.includes('⚠') || notes.includes('research');

    card.innerHTML = `
      <div class="source-badge ${getDotClass(source)}" title="${getSourceLabel(source)}"></div>
      <div class="num">#${String(num).padStart(3,'0')}</div>
      <div class="sprite-wrap">
        <div class="sprite-inner"><img alt="${name}"></div>
      </div>
      <div class="name">${name.replace('_', ' ')}</div>
      <div class="evo-short" title="${evo}">${evo}</div>
      ${hasResearch ? '<div class="research-flag">⚠ needs research</div>' : ''}
    `;
    grid.appendChild(card);
    loadSprite(card.querySelector('.sprite-inner img'), urls);
  });
}

function buildTable(data) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  data.forEach(([num, name, evo, source, notes]) => {
    const urls = spriteUrl(name, source);
    const tr = document.createElement('tr');
    tr.dataset.source = source;
    tr.dataset.name = name.toLowerCase();
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:0.8rem">#${String(num).padStart(3,'0')}</td>
      <td>
        <div class="sprite-wrap-table">
          <div class="sprite-inner-table"><img alt="${name}"></div>
        </div>
      </td>
      <td style="font-weight:bold">${name.replace(/_/g,' ')}</td>
      <td style="color:var(--muted);font-size:0.8rem">${evo}</td>
      <td><span class="tag ${getSourceClass(source)}">${getSourceLabel(source)}</span></td>
      <td style="color:var(--muted);font-size:0.8rem">${notes}</td>
    `;
    tbody.appendChild(tr);
    loadSprite(tr.querySelector('.sprite-inner-table img'), urls);
  });
}

function filterDex() {
  const q = document.getElementById('search').value.toLowerCase();
  const src = document.getElementById('source-filter').value;
  const filtered = DEX.filter(([num, name, evo, source, notes]) => {
    const matchName = name.toLowerCase().includes(q);
    const matchSrc = !src || source === src;
    return matchName && matchSrc;
  });
  buildGrid(filtered);
  buildTable(filtered);

}

function setView(v) {
  document.getElementById('grid-view').style.display = v === 'grid' ? 'grid' : 'none';
  document.getElementById('table-view').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
}

// Initial render
buildGrid(DEX);
buildTable(DEX);
