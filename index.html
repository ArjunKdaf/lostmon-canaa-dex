<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lostmon Canaã — Pokédex</title>
<style>
  :root {
    --bg: #1a1600;
    --card: #2a2200;
    --border: #4a3c00;
    --accent: #e8b800;
    --gold: #f0c040;
    --text: #e8f0f8;
    --muted: #8aabcc;
    --gs97r: #c8a000;
    --kep: #c0392b;
    --canonical: #555f6e;
    --spg: #2e8b57;
    --canaa: #e07030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; }

  header {
    background: linear-gradient(135deg, #2a2200, #1a1600);
    padding: 20px 40px;
    border-bottom: 2px solid var(--gold);
    text-align: center;
  }
  header h1 { font-size: 2.2rem; color: var(--gold); letter-spacing: 2px; }

  .controls {
    background: #211b00;
    padding: 12px 24px;
    display: flex; gap: 12px; align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .dex-count {
    font-size: 0.82rem; color: var(--muted); white-space: nowrap; flex-shrink: 0;
  }
  .dex-count span { color: var(--gold); font-weight: bold; }
  input[type=text] {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 8px; font-size: 0.9rem; width: 200px;
    outline: none; flex-shrink: 0;
  }
  input[type=text]:focus { border-color: var(--accent); }
  .src-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem;
    transition: background 0.12s, color 0.12s, border-color 0.12s; width: 100%;
    text-align: left;
  }
  .src-btn[data-src="gs97r"].active { background: rgba(200,160,0,0.18); color: var(--gs97r); border-color: var(--gs97r); }
  .src-btn[data-src="kep"].active   { background: rgba(192,57,43,0.18); color: #e05a4a; border-color: var(--kep); }
  .src-btn[data-src="canon"].active { background: rgba(85,95,110,0.25); color: #9aabb8; border-color: #555f6e; }
  .src-btn[data-src="spg"].active   { background: rgba(46,139,87,0.18); color: #4ecb7a; border-color: var(--spg); }
  .src-btn[data-src="canaa"].active { background: rgba(224,112,48,0.18); color: #f09050; border-color: var(--canaa); }
  .ctrl-right { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  .view-toggle { display: flex; gap: 6px; }
  .view-toggle button {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  }
  .view-toggle button.active { background: var(--accent); color: #1a1600; border-color: var(--accent); }
  .sprites-wrap { position: relative; }
  #btn-sprites {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  }
  #btn-sprites:hover { border-color: var(--accent); color: var(--accent); }
  .sprites-menu {
    position: absolute; right: 0; top: calc(100% + 6px);
    background: #211b00; border: 1px solid var(--border); border-radius: 10px;
    padding: 10px; min-width: 140px; z-index: 200;
    display: flex; flex-direction: column; gap: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .sprites-menu.hidden { display: none; }
  #btn-sprite-side {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem;
    text-align: left; width: 100%;
  }
  #btn-sprite-side.active { background: rgba(232,184,0,0.15); color: var(--gold); border-color: var(--accent); }
  .source-btns-vert { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }

  .legend {
    display: flex; gap: 12px; flex-wrap: wrap; padding: 12px 40px;
    background: #211b00; border-bottom: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* GRID VIEW */
  #grid-view {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    padding: 24px 40px;
  }
  @media (max-width: 1300px) { #grid-view { grid-template-columns: repeat(5, 1fr); } }
  @media (max-width: 1050px) { #grid-view { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 800px)  { #grid-view { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px)  { #grid-view { grid-template-columns: repeat(2, 1fr); padding: 12px 16px; } }
  @media (max-width: 360px)  { #grid-view { grid-template-columns: repeat(1, 1fr); } }
  @media (max-width: 480px) {
    .controls { padding: 8px 12px; gap: 6px; flex-wrap: wrap; }
    input[type=text] { flex: 1; width: auto; min-width: 0; }
    .ctrl-right { width: 100%; margin-left: 0; justify-content: flex-end; }
    .legend { padding: 10px 16px; }
  }
  .card {
    border: 2px solid #1a1600;
    border-radius: 12px;
    padding: 0;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    /* pokéball halves */
    background: conic-gradient(#bb0000 0deg 180deg, #e8e8e8 180deg 360deg);
  }
  /* center band */
  .card::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: calc(50% - 1.5px);
    height: 3px;
    background: #111;
    z-index: 1;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .card .sprite-wrap {
    width: 100%; height: 100%; margin: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    z-index: 2;
  }
  .card .sprite-wrap::before, .card .sprite-wrap::after { display: none; }
  .card .sprite-inner {
    width: 80%; height: 80%;
    border-radius: 10px;
    background: #ececec;
    border: 1px solid #333;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card .sprite-inner img {
    width: 95%; height: 95%;
    image-rendering: pixelated;
  }
  .card .sprite-inner .no-sprite {
    font-size: 1.8rem; color: #999;
  }
  /* Table view sprite — simpler pokeball ring */
  td .sprite-wrap-table {
    display: inline-flex; align-items: center; justify-content: center;
    width: 60px; height: 60px; border-radius: 50%; position: relative;
    background: conic-gradient(#cc0000 0deg 180deg, #ffffff 180deg 360deg);
    box-shadow: 0 0 0 2px #111;
  }
  td .sprite-wrap-table::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: calc(50% - 2px);
    height: 4px;
    background: #111;
    z-index: 1;
  }
  td .sprite-wrap-table .sprite-inner-table {
    position: relative; z-index: 2;
    width: 46px; height: 46px; border-radius: 50%;
    background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px #111;
    overflow: hidden;
  }
  td .sprite-wrap-table .sprite-inner-table img {
    width: 40px; height: 40px; image-rendering: pixelated;
  }
  .card .name-bar {
    position: absolute; bottom: 0; left: 0;
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(0,0,0,0.72); padding: 3px 8px;
    /* sprite-inner is 80% tall and centered → its bottom sits 10% from card bottom.
       Bar fills exactly that gap: from card bottom up to the sprite border. */
    height: 10%;
    border-radius: 0 10px 0 0;
    max-width: 90%; overflow: hidden;
    z-index: 3;
  }
  .card .num {
    font-size: 0.6rem; color: var(--muted); flex-shrink: 0;
  }
  .card .name {
    font-size: 0.68rem; font-weight: bold; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .name-badge {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  /* TABLE VIEW */
  #table-view { padding: 24px 40px; display: none; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    background: #2a2200; color: var(--gold); font-weight: bold;
    padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--gold);
    position: sticky; top: 57px;
  }
  td { padding: 8px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(232,184,0,0.05); }
  td img { image-rendering: pixelated; width: 48px; height: 48px; }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.72rem; font-weight: bold; white-space: nowrap;
  }

  .hidden { display: none !important; }

  /* Source colors */
  .src-gs97r   { background: rgba(91,155,213,0.2); color: #7bbfff; }
  .src-kep     { background: rgba(106,177,135,0.2); color: #7dd4a0; }
  .src-canon   { background: rgba(85,95,110,0.2); color: #aabbcc; }
  .src-spg     { background: rgba(46,139,87,0.2); color: #5dba82; }
  .src-canaa   { background: rgba(224,112,48,0.2); color: #f09050; }

  .dot-gs97r  { background: var(--gs97r); }
  .dot-kep    { background: var(--kep); }
  .dot-canon  { background: var(--canonical); }
  .dot-spg    { background: var(--spg); }
  .dot-canaa  { background: var(--canaa); }


  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); }

  /* ── DETAIL MODAL ────────────────────────────────────────────────────── */
  #detail-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 1000;
    align-items: flex-start; justify-content: center;
    padding: 16px;
    overflow-y: auto;
  }
  #detail-overlay.open { display: flex; }

  #detail-panel {
    background: #1e1900; border: 2px solid var(--gold);
    border-radius: 16px; width: 100%; max-width: 860px;
    height: fit-content;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    position: relative;
  }
  #detail-panel::-webkit-scrollbar { width: 6px; }
  #detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #detail-close {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none; color: var(--muted);
    font-size: 1.6rem; cursor: pointer; line-height: 1;
    z-index: 2;
  }
  #detail-close:hover { color: var(--gold); }

  .detail-header {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 28px 32px 18px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    position: relative;
  }
  .detail-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: 2px solid var(--border);
    width: 48px; height: 48px; border-radius: 50%;
    cursor: pointer; padding: 0; overflow: hidden;
    transition: border-color 0.12s;
  }
  .detail-nav::after {
    content: '';
    display: block;
    width: 10px; height: 10px;
    border-top: 2.5px solid var(--muted);
    border-right: 2.5px solid var(--muted);
    position: absolute; top: 50%; left: 50%;
    transition: border-color 0.12s;
  }
  #detail-prev::after {
    transform: translate(-25%, -50%) rotate(-135deg);
  }
  #detail-next::after {
    transform: translate(-75%, -50%) rotate(45deg);
  }
  .detail-nav:hover { border-color: var(--gold); }
  .detail-nav:hover::after { border-color: var(--gold); }
  #detail-prev { left: 14px; }
  #detail-next { right: 14px; }
  .detail-main-sprite {
    width: 120px; height: 120px;
    image-rendering: pixelated; background: #2a2000;
    border: 2px solid var(--border); border-radius: 10px;
    object-fit: contain;
  }
  .detail-num { font-size: 0.9rem; color: var(--muted); }
  .detail-name { font-size: 1.8rem; font-weight: bold; color: var(--gold); line-height: 1.1; }
  .detail-species { font-size: 0.95rem; color: var(--muted); margin-top: 2px; }
  .detail-types { display: flex; gap: 8px; margin-top: 6px; justify-content: center; }
  .type-badge {
    padding: 4px 14px; border-radius: 12px; font-size: 0.82rem;
    font-weight: bold; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .detail-body { padding: 20px 32px; display: flex; flex-direction: column; gap: 22px; }

  /* Evoline */
  .detail-section-label {
    font-size: 0.8rem; font-weight: bold; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
    text-align: center;
  }
  .evoline {
    display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap;
  }
  .evo-entry {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .evo-entry.active .evo-sprite-box { border-color: var(--gold); background: #2e2400; }
  .evo-sprite-box {
    width: 80px; height: 80px; border: 2px solid var(--border); border-radius: 10px;
    background: #222; display: flex; align-items: center; justify-content: center;
    overflow: hidden; transition: border-color 0.12s;
  }
  .evo-sprite-box:hover { border-color: var(--accent); }
  .evo-sprite-box img { width: 68px; height: 68px; image-rendering: pixelated; }
  .evo-name {
    font-size: 0.72rem; color: var(--muted); text-align: center;
    max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* Stats */
  .stat-row { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
  .stat-label { width: 40px; color: var(--muted); font-size: 0.8rem; text-align: right; flex-shrink: 0; }
  .stat-val { width: 32px; color: var(--text); font-weight: bold; flex-shrink: 0; }
  .stat-bar-bg { flex: 1; height: 9px; background: #2a2000; border-radius: 4px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .stat-total-row {
    display: flex; justify-content: space-between; font-size: 0.9rem;
    color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; margin-top: 6px;
  }
  .stat-total-val { color: var(--gold); font-weight: bold; }

  /* Dex text */
  .dex-text-box {
    background: #161200; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 18px; font-size: 0.92rem; line-height: 1.7; color: var(--text);
    font-family: monospace;
  }
  .dex-hw { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }

  /* Moves */
  .moves-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .moves-table th {
    background: #2a2200; color: var(--gold); padding: 7px 12px;
    text-align: left; border-bottom: 1px solid var(--border);
    font-size: 0.72rem; position: static;
  }
  .moves-table td { padding: 5px 10px; border-bottom: 1px solid #2a2000; }
  .moves-table tr:hover td { background: rgba(232,184,0,0.04); }
  .move-level { color: var(--muted); font-size: 0.75rem; }
  .move-name { color: var(--text); }
  .move-type-badge {
    padding: 2px 7px; border-radius: 10px; font-size: 0.66rem;
    font-weight: bold; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    text-transform: uppercase; letter-spacing: 0.3px;
  }

  /* ── MOBILE DETAIL PANEL ─────────────────────────────────────────────── */
  @media (max-width: 600px) {
    #detail-overlay { padding: 6px; overflow-x: hidden; }

    #detail-panel { border-radius: 12px; overflow-x: hidden; }

    .detail-header { padding: 18px 14px 14px; gap: 7px; }

    .detail-nav { width: 36px; height: 36px; }
    #detail-prev { left: 6px; }
    #detail-next { right: 6px; }

    .detail-main-sprite { width: 80px; height: 80px; }
    .detail-name  { font-size: 1.3rem; }
    .detail-species { font-size: 0.82rem; }

    .detail-body { padding: 14px 14px; gap: 16px; }

    /* Scale down the entire evoline so wide chains fit on screen.
       zoom affects layout (unlike transform:scale), so the container
       shrinks naturally and inline-styled arrow divs scale with it.
       Worst case: 4-stage linear chain = 572px CSS. Available width ~335px.
       0.58 × 572 = 332px — fits. */
    .evoline { zoom: 0.58; }

    .evo-sprite-box { width: 62px; height: 62px; }
    .evo-sprite-box img { width: 52px; height: 52px; }
    .evo-name { max-width: 62px; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Lostmon Canaã</h1>
</header>

<div class="controls">
  <span class="dex-count">Total: <span id="total-count">0</span></span>
  <input type="text" id="search" placeholder="🔍 Search name..." oninput="filterDex()">
  <div class="ctrl-right">
    <div class="view-toggle">
      <button id="btn-grid" class="active" onclick="setView('grid')">⊞ Grid</button>
      <button id="btn-table" onclick="setView('table')">☰ Table</button>
    </div>
    <div class="sprites-wrap">
      <button id="btn-sprites" onclick="toggleSpritesMenu(event)">🖼 Sprites</button>
      <div id="sprites-menu" class="sprites-menu hidden">
        <button id="btn-sprite-side" onclick="toggleSpriteSide()">🔄 Show Back</button>
        <div class="source-btns-vert">
          <button class="src-btn" data-src="gs97r" onclick="toggleSource(this)">GS97R</button>
          <button class="src-btn" data-src="kep" onclick="toggleSource(this)">KEP</button>
          <button class="src-btn" data-src="canon" onclick="toggleSource(this)">Canon</button>
          <button class="src-btn" data-src="spg" onclick="toggleSource(this)">SPG</button>
          <button class="src-btn" data-src="canaa" onclick="toggleSource(this)">Canaã</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-gs97r"></div> GS97R</div>
  <div class="legend-item"><div class="legend-dot dot-kep"></div> KEP</div>
  <div class="legend-item"><div class="legend-dot dot-canon"></div> Canon</div>
  <div class="legend-item"><div class="legend-dot dot-spg"></div> SPG</div>
  <div class="legend-item"><div class="legend-dot dot-canaa"></div> Canaã</div>
</div>

<div id="grid-view"></div>
<div id="table-view">
  <table>
    <thead>
      <tr>
        <th>#</th><th>Sprite</th><th>Name</th><th>Evolution</th><th>Source</th><th>Notes</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div id="detail-overlay" onclick="closeDetailIfOutside(event)">
  <div id="detail-panel">
    <button id="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-header">
      <button class="detail-nav" id="detail-prev" onclick="navigateDex(-1)" title="Previous"></button>
      <button class="detail-nav" id="detail-next" onclick="navigateDex(1)" title="Next"></button>
      <img id="detail-sprite" class="detail-main-sprite" alt="">
      <div class="detail-num" id="detail-num"></div>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-species" id="detail-species"></div>
      <div class="detail-types" id="detail-types"></div>
    </div>
    <div class="detail-body">
      <div>
        <div class="detail-section-label">Evolution Line</div>
        <div class="evoline" id="detail-evoline"></div>
      </div>
      <div>
        <div class="detail-section-label">Base Stats</div>
        <div id="detail-stats"></div>
      </div>
      <div>
        <div class="detail-section-label">Pokédex</div>
        <div class="dex-text-box">
          <div id="detail-dex-text"></div>
          <div class="dex-hw" id="detail-dex-hw"></div>
        </div>
      </div>
      <div>
        <div class="detail-section-label">Level-Up Moves</div>
        <table class="moves-table">
          <thead><tr><th>Lv.</th><th>Move</th><th>Type</th></tr></thead>
          <tbody id="detail-moves"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<footer>Lostmon Canaã — Sprites used from gold97 (SoupPotato), kep-hack (ShiraTheMogul), polishedcrystal (Rangi42) and shinpokered (jojobear13).</footer>

<script>


let showBack = false;
let currentView = 'grid';
let currentData = [];

function toggleSpriteSide() {
  showBack = !showBack;
  const btn = document.getElementById('btn-sprite-side');
  btn.textContent = showBack ? '🔄 Show Front' : '🔄 Show Back';
  btn.classList.toggle('active', showBack);
  renderCurrentView(currentData);
}

function toggleSpritesMenu(e) {
  e.stopPropagation();
  document.getElementById('sprites-menu').classList.toggle('hidden');
}

document.addEventListener('click', function() {
  document.getElementById('sprites-menu').classList.add('hidden');
});
document.getElementById('sprites-menu').addEventListener('click', function(e) {
  e.stopPropagation();
});

function nameToKey(name) {
  return name.toLowerCase()
    .replace('farfetch_d', 'farfetchd')
    .replace('sirfetch_d', 'sirfetchd')
    .replace('porygon-z',  'porygon_z')
    .replace(/[^a-z0-9_]/g, '');
}

function spriteUrl(name) {
  const n = nameToKey(name);
  const side = showBack ? 'back' : 'front';
  return ['sprites/' + n + '/' + side + '.png', 'sprites/' + n + '.png'];
}

function getSourceClass(source) {
  const map = { gs97r:'src-gs97r', kep:'src-kep', spg:'src-spg', canaa:'src-canaa' };
  return map[source] || 'src-canon';
}
function getDotClass(source) { return 'dot-' + source; }

function getSourceLabel(source) {
  const map = { gs97r:'GS97R', kep:'KEP', canon:'Canon', spg:'SPG', canaa:'Canaã' };
  return map[source] || source;
}

// Smart image loader with fallback
function loadSprite(imgEl, urls, index = 0) {
  if (index >= urls.length) {
    // No sprite found — replace with question mark
    const wrap = imgEl.parentElement;
    wrap.innerHTML = '<div class="no-sprite">?</div>';
    return;
  }
  imgEl.src = urls[index];
  imgEl.onerror = () => loadSprite(imgEl, urls, index + 1);
}

function buildGrid(data) {
  const grid = document.getElementById('grid-view');
  grid.innerHTML = '';
  data.forEach(([num, name, , source]) => {
    const urls = spriteUrl(name);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.source = source;
    card.dataset.name = name.toLowerCase();
    card.dataset.num = num;

    card.innerHTML = `
      <div class="sprite-wrap">
        <div class="sprite-inner"><img alt="${name}"></div>
      </div>
      <div class="name-bar">
        <span class="num">#${String(num).padStart(3,'0')}</span>
        <span class="name-badge ${getDotClass(source)}" title="${getSourceLabel(source)}"></span>
        <span class="name">${displayName(name)}</span>
      </div>
    `;
    card.addEventListener('click', () => openDetail(num));
    grid.appendChild(card);
    loadSprite(card.querySelector('.sprite-inner img'), urls);
  });
}

function buildTable(data) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  data.forEach(([num, name, evo, source, notes]) => {
    const urls = spriteUrl(name);
    const tr = document.createElement('tr');
    tr.dataset.source = source;
    tr.dataset.name = name.toLowerCase();
    tr.dataset.num = num;
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:0.8rem">#${String(num).padStart(3,'0')}</td>
      <td>
        <div class="sprite-wrap-table">
          <div class="sprite-inner-table"><img alt="${name}"></div>
        </div>
      </td>
      <td style="font-weight:bold">${displayName(name)}</td>
      <td style="color:var(--muted);font-size:0.8rem">${evo}</td>
      <td><span class="tag ${getSourceClass(source)}">${getSourceLabel(source)}</span></td>
      <td style="color:var(--muted);font-size:0.8rem">${notes}</td>
    `;
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => openDetail(num));
    tbody.appendChild(tr);
    loadSprite(tr.querySelector('.sprite-inner-table img'), urls);
  });
}

function toggleSource(btn) {
  btn.classList.toggle('active');
  filterDex();
}

function renderCurrentView(data) {
  currentData = data;
  if (currentView === 'grid') buildGrid(data);
  else buildTable(data);
}

function filterDex() {
  const q = document.getElementById('search').value.toLowerCase();
  const activeSources = [...document.querySelectorAll('.src-btn.active')].map(b => b.dataset.src);
  const filtered = DEX.filter(([, name, , source]) => {
    const matchName = name.toLowerCase().includes(q);
    const matchSrc = activeSources.length === 0 || activeSources.includes(source);
    return matchName && matchSrc;
  });
  renderCurrentView(filtered);
}

function setView(v) {
  currentView = v;
  document.getElementById('grid-view').style.display = v === 'grid' ? 'grid' : 'none';
  document.getElementById('table-view').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
  renderCurrentView(currentData);
}

function loadSpriteInto(img, name) {
  const n = nameToKey(name);
  loadSprite(img, ['sprites/' + n + '/front.png', 'sprites/' + n + '.png']);
}

function displayName(name) {
  return name.replace(/_/g, ' ');
}

function formatMoveName(moveName) {
  return moveName.replace(/_M$/, '').replace(/_/g, ' ')
    .toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function typeBadge(type, cls='type-badge') {
  const color = TYPE_COLORS[type] || '#888';
  return `<span class="${cls}" style="background:${color}">${type}</span>`;
}

function openDetail(pid) {
  const pokemon = pokemonData?.[String(pid)];
  if (!pokemon) return;
  currentDetailId = pid;

  // header
  document.getElementById('detail-num').textContent = '#' + String(pid).padStart(3,'0');
  document.getElementById('detail-name').textContent = displayName(pokemon.name);

  const species = pokemon.dex && pokemon.dex.species ? pokemon.dex.species : '';
  document.getElementById('detail-species').textContent = species ? species + ' Pokémon' : '';

  const typesEl = document.getElementById('detail-types');
  typesEl.innerHTML = pokemon.types.map(typeName => typeBadge(typeName)).join('');

  const mainImg = document.getElementById('detail-sprite');
  loadSpriteInto(mainImg, pokemon.name);
  // evoline
  buildEvoLine(pokemon, pid);

  // stats
  buildStats(pokemon.stats);

  // dex text
  document.getElementById('detail-dex-text').textContent =
    pokemon.dex && pokemon.dex.text ? '"' + pokemon.dex.text + '"' : '—';
  if (pokemon.dex && pokemon.dex.height) {
    const heightRaw = pokemon.dex.height, weightRaw = pokemon.dex.weight;
    const feet = Math.floor(heightRaw / 100), inches = Math.round((heightRaw % 100) * 0.393701);
    document.getElementById('detail-dex-hw').textContent =
      `Height: ${feet}'${inches.toString().padStart(2,'0')}"  Weight: ${(weightRaw/10).toFixed(1)} kg`;
  } else {
    document.getElementById('detail-dex-hw').textContent = '';
  }

  // moves
  const tbody = document.getElementById('detail-moves');
  tbody.innerHTML = '';
  (pokemon.moves || []).forEach(mv => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="move-level">${mv.level === 0 ? '—' : mv.level}</td>
      <td class="move-name">${formatMoveName(mv.move)}</td>
      <td>${typeBadge(mv.type, 'move-type-badge')}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function buildEvoEntry(pid, activePid) {
  const pokemon = pokemonData[String(pid)];
  if (!pokemon) return null;
  const entry = document.createElement('div');
  entry.className = 'evo-entry' + (pid === activePid ? ' active' : '');
  entry.title = displayName(pokemon.name);
  entry.onclick = () => openDetail(pid);
  const imgEl = document.createElement('img');
  imgEl.width = 68; imgEl.height = 68;
  const box = document.createElement('div');
  box.className = 'evo-sprite-box';
  box.appendChild(imgEl);
  const nameDiv = document.createElement('div');
  nameDiv.className = 'evo-name';
  nameDiv.textContent = displayName(pokemon.name);
  entry.appendChild(box);
  entry.appendChild(nameDiv);
  loadSpriteInto(imgEl, pokemon.name);
  return entry;
}

function makeArrow(label) {
  const arrowDiv = document.createElement('div');
  arrowDiv.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;align-self:center;min-width:72px;gap:2px';
  arrowDiv.innerHTML = `<span style="font-size:1.2rem;color:var(--muted)">→</span>`
    + (label ? `<span style="font-size:0.62rem;color:var(--muted);white-space:nowrap;text-align:center">${label}</span>` : '');
  return arrowDiv;
}

function buildEvoLine(pokemon, activePid) {
  const evolineContainer = document.getElementById('detail-evoline');
  evolineContainer.innerHTML = '';
  const line = pokemon.evoline || [activePid];
  if (line.length <= 1) {
    evolineContainer.innerHTML = '<span style="color:var(--muted);font-size:0.8rem">No evolution</span>';
    return;
  }

  // Build parent→children maps within this evoline (preserving evos order)
  const lineSet = new Set(line);
  const evoParents = {};   // pid → [parent pids]
  const evoChildren = {};  // pid → [child pids, in evos order]
  line.forEach(pid => {
    const pokemonEntry = pokemonData[String(pid)];
    if (!pokemonEntry || !pokemonEntry.evos) return;
    pokemonEntry.evos.forEach(evo => {
      if (!lineSet.has(evo.target)) return;
      if (!evoParents[evo.target]) evoParents[evo.target] = [];
      evoParents[evo.target].push(pid);
      if (!evoChildren[pid]) evoChildren[pid] = [];
      evoChildren[pid].push(evo.target);
    });
  });

  // Compute depth for each member by following first-parent chain to the root
  const depth = {};
  line.forEach(pid => {
    let depthCount = 0, current = pid, seen = new Set();
    while (evoParents[current] && !seen.has(current)) { seen.add(current); current = evoParents[current][0]; depthCount++; }
    depth[pid] = depthCount;
  });
  const maxDepth = Math.max(...Object.values(depth));
  if (maxDepth === 0) { evolineContainer.innerHTML = '<span style="color:var(--muted);font-size:0.8rem">No evolution</span>'; return; }

  // Group by depth (line already in correct display order from JSON)
  const byDepth = {};
  line.forEach(pid => {
    const depthLevel = depth[pid];
    if (!byDepth[depthLevel]) byDepth[depthLevel] = [];
    byDepth[depthLevel].push(pid);
  });

  for (let depthLevel = 0; depthLevel <= maxDepth; depthLevel++) {
    const group = byDepth[depthLevel] || [];
    const nextGroup = byDepth[depthLevel + 1] || [];

    if (depthLevel === 0) {
      if (group.length === 1) {
        // Single root — just show sprite
        evolineContainer.appendChild(buildEvoEntry(group[0], activePid));
      } else {
        // Multiple roots (e.g. MIME_JR + BALLERINE) — stack vertically, each with own arrow to child
        // Will be handled as part of the column structure below
        const col = document.createElement('div');
        col.style.cssText = 'display:flex;flex-direction:column;gap:6px;align-items:flex-end';
        group.forEach(pid => col.appendChild(buildEvoEntry(pid, activePid)));
        evolineContainer.appendChild(col);
      }
    } else {
      if (group._skip) continue;
      if (group.length === 1 && (byDepth[depthLevel - 1] || []).length === 1) {
        // Linear: single arrow + single sprite
        const parentPid = (evoParents[group[0]] || [])[0];
        evolineContainer.appendChild(makeArrow(getEvoMethod(parentPid, group[0])));
        evolineContainer.appendChild(buildEvoEntry(group[0], activePid));
      } else if (group.length > 1) {
        // Branching: one parent → many children — column of [arrow+label + sprite] rows
        // If a child has a single linear continuation, inline it in the same row
        const col = document.createElement('div');
        col.style.cssText = 'display:flex;flex-direction:column;gap:6px;align-self:center';
        const skipDepths = new Set();
        group.forEach(pid => {
          const parentPid = (evoParents[pid] || [])[0];
          const row = document.createElement('div');
          row.style.cssText = 'display:flex;align-items:center;gap:4px';
          row.appendChild(makeArrow(getEvoMethod(parentPid, pid)));
          row.appendChild(buildEvoEntry(pid, activePid));
          // Follow any single linear chain from this child
          let current = pid;
          while ((evoChildren[current] || []).length === 1) {
            const nextPid = evoChildren[current][0];
            if ((evoParents[nextPid] || []).length !== 1) break;
            row.appendChild(makeArrow(getEvoMethod(current, nextPid)));
            row.appendChild(buildEvoEntry(nextPid, activePid));
            skipDepths.add(depth[nextPid]);
            current = nextPid;
          }
          col.appendChild(row);
        });
        evolineContainer.appendChild(col);
        skipDepths.forEach(skippedDepth => { if (byDepth[skippedDepth]) byDepth[skippedDepth]._skip = true; });
      } else {
        // Single child, multiple parents (convergent) — parents already rendered with own arrows
        // Just show shared arrow + sprite
        const parentPid = (evoParents[group[0]] || [])[0];
        evolineContainer.appendChild(makeArrow(getEvoMethod(parentPid, group[0])));
        evolineContainer.appendChild(buildEvoEntry(group[0], activePid));
      }
    }

    // After rendering depth-0 multi-root, inject individual arrows pointing to their shared child
    if (depthLevel === 0 && group.length > 1 && nextGroup.length === 1) {
      const childPid = nextGroup[0];
      const col = document.createElement('div');
      col.style.cssText = 'display:flex;flex-direction:column;gap:6px;align-self:center;align-items:center';
      group.forEach(pid => col.appendChild(makeArrow(getEvoMethod(pid, childPid))));
      evolineContainer.appendChild(col);
      // Render the convergent child directly here and mark depth 1 as done
      evolineContainer.appendChild(buildEvoEntry(childPid, activePid));
      byDepth[1] = byDepth[1] || [];
      byDepth[1]._skip = true;
    }
  }
}


function getEvoMethod(fromPid, toPid) {
  const fromPokemon = pokemonData[String(fromPid)];
  if (!fromPokemon || !fromPokemon.evos) return '';
  const evo = fromPokemon.evos.find(e => e.target === toPid);
  if (!evo) return '';
  const method = evo.method, param = evo.param || '';
  if (method === 'EVOLVE_LEVEL') return 'Lv.' + param;
  if (method === 'EVOLVE_ITEM') return param.replace(/_/g,' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  if (method === 'EVOLVE_TRADE') return param && param !== '-1' ? 'Trade\n(' + param.replace(/_/g,' ') + ')' : 'Trade';
  if (method === 'EVOLVE_HAPPINESS') return 'Happiness';
  if (method === 'EVOLVE_STAT') return 'Lv.' + param + '\n(Stat)';
  return '';
}

function buildStats(stats) {
  const el = document.getElementById('detail-stats');
  const keys = ['hp','atk','def','spd','satk','sdef'];
  const labels = ['HP','ATK','DEF','SPD','SpA','SpD'];
  const MAX_STAT = 200;
  let html = '';
  keys.forEach((k, i) => {
    const val = stats[k] || 0;
    const pct = Math.min(100, Math.round(val / MAX_STAT * 100));
    const color = STAT_COLORS[k];
    html += `
      <div class="stat-row">
        <div class="stat-label">${labels[i]}</div>
        <div class="stat-val">${val}</div>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
  });
  html += `<div class="stat-total-row"><span>Total</span><span class="stat-total-val">${stats.total}</span></div>`;
  el.innerHTML = html;
}

function navigateDex(dir) {
  const ids = DEX.map(entry => entry[0]);
  const idx = ids.indexOf(currentDetailId);
  if (idx === -1) return;
  const nextIdx = (idx + dir + ids.length) % ids.length;
  openDetail(ids[nextIdx]);
}

function closeDetail() {
  const pid = currentDetailId;
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentDetailId = null;
  if (pid != null) {
    const el = document.querySelector(`[data-num="${pid}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function closeDetailIfOutside(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  else if (e.key === 'ArrowLeft'  && currentDetailId) navigateDex(-1);
  else if (e.key === 'ArrowRight' && currentDetailId) navigateDex(1);
});
</script>
